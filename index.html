<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 한국어 · Daily Korean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #faf6ef;
    --red: #c0392b;
    --gold: #b8860b;
    --muted: #8a7a6a;
    --line: #d4c9b8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Subtle paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 34px, rgba(180,160,130,0.06) 35px),
      repeating-linear-gradient(90deg, transparent, transparent 34px, rgba(180,160,130,0.04) 35px);
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  body::after {
    content: '';
    position: fixed;
    left: clamp(40px, 8vw, 100px);
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: rgba(192,57,43,0.25);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: clamp(40px, 8vw, 80px) clamp(24px, 5vw, 60px) clamp(40px, 8vw, 80px) clamp(60px, 12vw, 130px);
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }

  .site-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .site-title span {
    color: var(--red);
    font-weight: 400;
  }

  .day-badge {
    margin-left: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
  }

  /* Date display */
  .date-line {
    margin-top: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 2.5vw, 15px);
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Category tag */
  .category-tag {
    margin-top: 10px;
    display: inline-block;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid rgba(192,57,43,0.35);
    padding: 3px 10px;
    border-radius: 2px;
  }

  /* Main Korean word */
  .korean-word {
    margin-top: 40px;
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(56px, 14vw, 100px);
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
    display: inline-block;
  }

  .korean-word:hover { color: var(--red); }

  /* Romanization */
  .romanization {
    margin-top: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(20px, 4vw, 28px);
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  /* Divider rule */
  .rule {
    margin: 28px 0;
    height: 1px;
    background: linear-gradient(to right, var(--red), var(--line) 60%, transparent);
  }

  /* Meaning */
  .meaning-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 8px;
  }

  .meaning-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4.5vw, 30px);
    font-weight: 300;
    line-height: 1.35;
    color: var(--ink);
  }

  /* Example sentence */
  .example-block {
    margin-top: 32px;
    padding: 20px 24px;
    border-left: 3px solid var(--red);
    background: rgba(192,57,43,0.03);
  }

  .example-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 10px;
  }

  .example-korean {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: 400;
    color: var(--ink);
    line-height: 1.6;
    cursor: pointer;
    transition: color 0.2s;
  }

  .example-korean:hover { color: var(--red); }

  .example-romanization {
    margin-top: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--gold);
  }

  .example-english {
    margin-top: 8px;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 2.5vw, 18px);
    font-style: italic;
    color: var(--muted);
    font-weight: 300;
  }

  /* Pronunciation button */
  .speak-btn {
    margin-top: 36px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    border-radius: 2px;
  }

  .speak-btn:hover { background: var(--red); }
  .speak-btn:active { transform: scale(0.97); }

  .speak-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* Sound wave animation */
  .wave {
    display: none;
    align-items: center;
    gap: 3px;
    height: 16px;
  }

  .wave.playing { display: inline-flex; }

  .wave span {
    display: block;
    width: 3px;
    background: var(--paper);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .wave span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 14px; animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 8px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 5px; animation-delay: 0.15s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Progress / streak */
  .streak-line {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .streak-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
  }

  .streak-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
    transition: background 0.3s;
  }

  .dot.visited { background: var(--red); }
  .dot.today { background: var(--gold); box-shadow: 0 0 0 2px rgba(184,134,11,0.3); }

  /* Footer */
  footer {
    margin-top: auto;
    padding-top: 40px;
    padding-bottom: 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  /* Entrance animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate { animation: fadeUp 0.7s ease forwards; }
  .animate-2 { animation: fadeUp 0.7s 0.15s ease both; }
  .animate-3 { animation: fadeUp 0.7s 0.3s ease both; }
  .animate-4 { animation: fadeUp 0.7s 0.45s ease both; }

  /* Hover tip */
  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-top: 8px;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    body::after { left: 20px; }
    .wrapper { padding-left: 40px; }
  }
</style>
</head>

<div class="wrapper">

  <footer>
    A new word every day · 365 days of Korean · 한국어를 매일 배워보세요
  </footer>

</div>

// ============================================================
// Day calculation — deterministic, offset from Jan 1 2026
// ============================================================
function getDayIndex() {
  const start = new Date(2026, 0, 1); // Jan 1 2026
  const now = new Date();
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return ((diff % words.length) + words.length) % words.length;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ============================================================
// Load today's word
// ============================================================
const idx = getDayIndex();
const today = words[idx];
const now = new Date();

document.getElementById('dateDisplay').textContent = formatDate(now);
document.getElementById('categoryTag').textContent = today.cat;
document.getElementById('koreanWord').textContent = today.k;
document.getElementById('romanization').textContent = today.r;
document.getElementById('meaningText').textContent = today.m;
document.getElementById('exampleKorean').textContent = today.ek;
document.getElementById('exampleRoman').textContent = today.er;
document.getElementById('exampleEnglish').textContent = today.ee;

// Day number (1-365 from start of cycle)
document.getElementById('dayBadge').textContent = `Word ${idx + 1} of ${words.length}`;

// ============================================================
// Streak dots — track visited days in localStorage
// ============================================================
function initStreak() {
  const KEY = 'korean_visited';
  let visited = JSON.parse(localStorage.getItem(KEY) || '[]');
  if (!visited.includes(idx)) {
    visited.push(idx);
    localStorage.setItem(KEY, JSON.stringify(visited));
  }

  const container = document.getElementById('streakDots');
  const show = Math.min(words.length, 52); // show 52 dot window
  const start = Math.max(0, idx - 25);

  for (let i = start; i < start + show && i < words.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === idx ? ' today' : (visited.includes(i) ? ' visited' : ''));
    dot.title = `Word ${i + 1}`;
    container.appendChild(dot);
  }
}

initStreak();

// ============================================================
// Text-to-speech using Web Speech API
// ============================================================
let isSpeaking = false;

function speakText(text, onDone) {
  if (!window.speechSynthesis) {
    alert('Your browser does not support text-to-speech. Try Chrome or Edge.');
    return;
  }

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = 0.85;
  utter.pitch = 1;

  // Try to find a Korean voice
  const voices = window.speechSynthesis.getVoices();
  const koreanVoice = voices.find(v => v.lang === 'ko-KR' || v.lang.startsWith('ko'));
  if (koreanVoice) utter.voice = koreanVoice;

  const btn = document.getElementById('speakBtn');
  const wave = document.getElementById('waveAnim');
  const btnText = document.getElementById('btnText');

  isSpeaking = true;
  wave.classList.add('playing');
  btnText.textContent = 'Playing…';

  utter.onend = utter.onerror = () => {
    isSpeaking = false;
    wave.classList.remove('playing');
    btnText.textContent = 'Pronounce';
    if (onDone) onDone();
  };

  window.speechSynthesis.speak(utter);
}

function speakKorean(thenExample) {
  speakText(today.k, thenExample ? () => {
    setTimeout(() => speakText(today.ek), 800);
  } : null);
}

function speakExample() {
  speakText(today.ek);
}

// Chrome needs voices loaded async
window.speechSynthesis.onvoiceschanged = () => {};

// Auto-speak the word once on page load (after small delay)
window.addEventListener('load', () => {
  setTimeout(() => {
    // Only auto-speak if user has interacted or if no prior autoplay block
    // We'll just prime the voice list silently
    window.speechSynthesis.getVoices();
  }, 600);
});
